---
- name: Check Docker Swarm state
  ansible.builtin.command: docker info --format '{{ "{{" }}.Swarm.LocalNodeState{{ "}}" }}'
  register: swarm_state
  changed_when: false

- name: Initialize Docker Swarm
  ansible.builtin.command: docker swarm init --advertise-addr {{ ansible_default_ipv4.address }}
  when: swarm_state.stdout != 'active'

- name: Create traefik-public overlay network
  ansible.builtin.command: docker network create --driver overlay --attachable traefik-public
  register: network_result
  failed_when: network_result.rc != 0 and 'already exists' not in network_result.stderr
  changed_when: network_result.rc == 0
