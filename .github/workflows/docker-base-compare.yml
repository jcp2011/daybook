name: Compare base image CVEs

on:
  push:
    branches:
      - main
    paths:
      - 'docker/Dockerfile'
      - '.github/workflows/docker-base-compare.yml'
  workflow_dispatch:
    inputs:
      base_image:
        description: 'Base image to test'
        required: false
        default: 'ubuntu:noble'

permissions:
  contents: read
  security-events: write

jobs:
  build-and-scan:
    name: Build (${{ github.event.inputs.base_image || 'ubuntu:noble' }}) and scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: docker
          platforms: linux/amd64
          push: false
          load: true
          tags: daybook:base-test
          build-args: |
            BASE_IMAGE=${{ github.event.inputs.base_image || 'ubuntu:noble' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan with Trivy (table)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: daybook:base-test
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Scan with Trivy (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: daybook:base-test
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
