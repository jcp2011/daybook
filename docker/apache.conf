<VirtualHost *:80>
    ServerName ${DAYBOOK_FQDN}
    DocumentRoot /var/www/html

    # Security headers sent on every response.
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    # X-XSS-Protection is explicitly disabled: modern browsers use CSP instead.
    Header always set X-XSS-Protection "0"

    <Directory /var/www/html>
        AllowOverride None
        Require all granted
        Options -Indexes -FollowSymLinks

        # AuthType GSSAPI with Require all granted makes Kerberos optional:
        # Apache attempts SPNEGO negotiation and sets REMOTE_USER on success,
        # but never blocks access if negotiation fails or is not attempted.
        # PHP reads REMOTE_USER for the SSO path; if absent it shows the
        # LDAPS login form.
        #
        # NEVER add "Require valid-user" here. PHP enforces group membership on
        # both auth paths; Apache must not block the LDAPS fallback.
        AuthType GSSAPI
        GssapiCredStore keytab:/run/secrets/daybook.keytab
        # Explicitly name the SPN to use from the keytab. This decouples GSSAPI
        # from the container hostname, which allows deployment in Docker Swarm
        # where the container hostname may not match the AD-registered SPN.
        # Must match the /princ value used when generating the keytab with ktpass.
        GssapiAcceptorName HTTP/${DAYBOOK_FQDN}
        GssapiLocalName On
        GssapiNegotiateOnce On
    </Directory>

    # Redirect logs to stdout/stderr for Docker foreground logging.
    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
