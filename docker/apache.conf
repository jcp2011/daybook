<VirtualHost *:80>
    ServerName ${DAYBOOK_FQDN}
    DocumentRoot /var/www/html

    # Security headers sent on every response.
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    # X-XSS-Protection is explicitly disabled: modern browsers use CSP instead.
    Header always set X-XSS-Protection "0"

    <Directory /var/www/html>
        AllowOverride None
        Require all granted
        Options -Indexes -FollowSymLinks
    </Directory>

    # Dedicated SSO endpoint. Apache enforces Kerberos SPNEGO here only.
    # On success REMOTE_USER is set; sso.php verifies group membership and
    # creates the PHP session. The login form probes this URL via a silent
    # fetch() — a 401 response from fetch never triggers a browser popup,
    # so non-Kerberos clients simply fall through to the LDAPS login form.
    <Location "/sso.php">
        AuthType GSSAPI
        GssapiCredStore keytab:/run/secrets/daybook.keytab
        # Decouple the SPN from the container hostname (required in Swarm).
        # Must match the /princ value used when generating the keytab.
        GssapiAcceptorName HTTP/${DAYBOOK_FQDN}
        GssapiLocalName On
        GssapiNegotiateOnce On
        Require valid-user
    </Location>

    # Redirect logs to stdout/stderr for Docker foreground logging.
    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
