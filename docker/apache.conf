<VirtualHost *:80>
    ServerName ${DAYBOOK_FQDN}
    DocumentRoot /var/www/html

    # Security headers sent on every response.
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    # X-XSS-Protection is explicitly disabled: modern browsers use CSP instead.
    Header always set X-XSS-Protection "0"

    <Directory /var/www/html>
        AllowOverride None
        Require all granted
        Options -Indexes -FollowSymLinks
    </Directory>

    # Dedicated SSO endpoint. Apache enforces Kerberos SPNEGO here only.
    # On success REMOTE_USER is set; sso.php verifies group membership and
    # creates the PHP session.
    # Unauthenticated GET requests to the app are redirected here (top-level
    # navigation), so Edge/Chrome on domain-joined machines respond to the
    # 401+Negotiate challenge automatically without intranet zone configuration.
    # Non-Kerberos clients receive a 401 which Apache internally redirects to
    # index.php via ErrorDocument - they see the LDAPS login form instead of a
    # browser credential popup.
    <Location "/sso.php">
        AuthType GSSAPI
        GssapiCredStore keytab:/run/secrets/daybook.keytab
        # mod_auth_gssapi always uses GSS_C_NT_HOSTBASED_SERVICE, which requires
        # the format "service@host". The GSSAPI library then calls
        # krb5_sname_to_principal("host", "service") and resolves the realm via
        # [domain_realm] in krb5.conf. Must match the SPN in the keytab.
        GssapiAcceptorName HTTP@${DAYBOOK_FQDN}
        GssapiLocalName On
        GssapiNegotiateOnce On
        Require valid-user
        ErrorDocument 401 /index.php
    </Location>

    # Redirect logs to stdout/stderr for Docker foreground logging.
    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
