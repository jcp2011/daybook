; PHP security overrides applied on top of php.ini-production.

expose_php             = Off
display_errors         = Off
display_startup_errors = Off
log_errors             = On

; Session hardening.
; TLS is terminated upstream by Traefik - the browser-to-proxy leg is HTTPS so the
; Secure flag must be set even though PHP itself receives plain HTTP from the proxy.
session.use_strict_mode  = 1
session.cookie_httponly  = 1
session.cookie_samesite  = Strict
session.cookie_secure    = 1
session.use_only_cookies = 1
session.gc_maxlifetime   = 3600
