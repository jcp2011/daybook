[libdefaults]
    dns_lookup_kdc   = true
    dns_lookup_realm = true
    # Required for gss_localname(): strips @REALM from user principals.
    # dns_lookup_realm covers KDC discovery but is not used by the name-mapping
    # code path. Adjust to match your Kerberos realm (usually uppercase AD domain).
    default_realm = COMPANY.COM
