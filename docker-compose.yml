services:
  daybook:
    image: daybook:latest
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
    environment:
      - DAYBOOK_FQDN
    security_opt:
      - no-new-privileges:true
    volumes:
      # Web root: only public-facing files. No secrets, no source, no config.
      - ./public:/var/www/html:ro
      # PHP source and templates: outside the web root, not reachable via HTTP.
      - ./src:/var/www/src:ro
      - ./templates:/var/www/templates:ro
      # Secrets and config: outside the web root, never baked into the image.
      - ./.env:/var/www/.env:ro
      - ./daybook.keytab:/run/secrets/daybook.keytab:ro
      # Data directory: writable named volume (SQLite database).
      - daybook-data:/var/www/data
      # Security config files: mounted so they can be tuned per deployment
      # (e.g. cookie_secure, ServerTokens) without rebuilding the image.
      - ./docker/apache.conf:/etc/apache2/sites-enabled/000-default.conf:ro
      - ./docker/security.conf:/etc/apache2/conf-enabled/99-security.conf:ro
      - ./docker/php-security.ini:/usr/local/etc/php/conf.d/99-security.ini:ro
    restart: unless-stopped

volumes:
  daybook-data:
